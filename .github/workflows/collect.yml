name: Marktfeed sammeln

on:
  schedule:
    # laeuft jede volle Stunde (UTC). Deckt 22:30-08:00 MEZ/MESZ ab,
    # sammelt aber bewusst rund um die Uhr - die Seite zeigt die letzten
    # RETENTION_DAYS Tage, du scrollst dir morgens die relevante Zeitspanne raus.
    - cron: "15 * * * *"
  workflow_dispatch: {}   # erlaubt manuellen Start über den "Actions"-Tab

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies installieren
        run: pip install -r requirements.txt

      - name: News sammeln
        run: python scripts/fetch_news.py

      - name: Kurse abrufen
        run: python scripts/fetch_market.py

      - name: Seite bauen
        run: python scripts/build_page.py

      - name: Änderungen committen
        run: |
          git config user.name "marktfeed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data docs
          git diff --quiet --cached || git commit -m "Update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
