name: Marktfeed sammeln

on:
  schedule:
    # Feste Laufzeiten, umgerechnet fuer MESZ (UTC+2, Sommerzeit).
    # Im Winter (MEZ, UTC+1) verschieben sich die Zeiten um -1h relativ
    # zur deutschen Uhrzeit - dann muessen die Werte um 1h erhoeht werden.
    - cron: "0 3 * * *"    # 05:00 MESZ
    - cron: "0 5 * * *"    # 07:00 MESZ
    - cron: "30 12 * * *"  # 14:30 MESZ
    - cron: "0 20 * * *"   # 22:00 MESZ
  workflow_dispatch: {}   # erlaubt manuellen Start über den "Actions"-Tab

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies installieren
        run: pip install -r requirements.txt

      - name: News sammeln
        run: python scripts/fetch_news.py

      - name: Kurse abrufen
        run: python scripts/fetch_market.py

      - name: Änderungen committen
        run: |
          git config user.name "marktfeed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs
          git diff --quiet --cached || git commit -m "Update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push